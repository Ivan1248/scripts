<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Tools</title>
    <style>
        :root {
            --color-canvas-subtle: #f6f8fa;
            --color-border-default: #d0d7de;
            --color-accent-fg: #0969da;
            --color-fg-default: #1f2328;
            --color-fg-muted: #657d95;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-size: 16px;
            line-height: 1.5;
            color: var(--color-fg-default);
            background-color: #ffffff;
            max-width: 1012px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--color-border-default);
            margin-bottom: 1rem;
        }

        .container {
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            overflow: hidden;
        }

        .header {
            background-color: var(--color-canvas-subtle);
            padding: 16px;
            border-bottom: 1px solid var(--color-border-default);
            font-weight: 600;
        }

        .tool-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tool-item {
            padding: 16px;
            border-bottom: 1px solid var(--color-border-default);
        }

        .tool-item:last-child {
            border-bottom: none;
        }

        .tool-link {
            color: var(--color-accent-fg);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .tool-link:hover {
            text-decoration: underline;
        }

        .tool-description {
            display: block;
            margin-top: 4px;
            color: var(--color-fg-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1>Web tools</h1>
    <div class="container">
        <ul class="tool-list">
            <li class="tool-item">
                <a href="parse-calendars-from-excel.html?eventName=OS&rooms=A109%2CA110%2CA110" class="tool-link">Excel to iCal parser</a>
                <span class="tool-description">Convert pasted Excel schedules into iCalendar (.ics) format and preview them in a custom calendar view.</span>
            </li>
        </ul>
    </div>
</body>

</html>
