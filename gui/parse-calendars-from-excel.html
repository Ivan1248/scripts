<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; background-color: #f4f7f9; color: #333; }
    h2 { text-align: center; color: #2c3e50; }
    
    #output { border: 2px dashed #4A90E2; padding: 25px; text-align: center; margin-bottom: 20px; background: white; border-radius: 12px; cursor: pointer; color: #666; }
    
    /* Room Configuration Panel */
    .room-config { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
    .room-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; font-weight: bold; }
    .color-swatch { width: 30px; height: 30px; border-radius: 4px; border: 1px solid #ccc; }
    .room-input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }

    /* Calendar Grid */
    .calendar-container { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow-x: auto; margin-bottom: 30px; }
    .calendar-table { width: 100%; border-collapse: collapse; min-width: 800px; table-layout: fixed; }
    .calendar-table th, .calendar-table td { border: 1px solid #e0e6ed; padding: 0; vertical-align: stretch; }
    .calendar-table th { background: #f8f9fa; padding: 12px 5px; font-size: 0.9em; color: #5a6c7f; border-bottom: 3px solid #dee2e6; }
    .time-cell { width: 90px; font-weight: bold; text-align: center; background: #f8f9fa !important; vertical-align: middle !important; font-size: 0.9em; }

    .slot-container { display: flex; height: 100%; min-height: 60px; width: 100%; align-items: stretch; }
    .event-block { 
      flex: 1; margin: 1px; padding: 4px; color: #000; font-size: 0.75em; font-weight: bold; text-align: center;
      display: flex; flex-direction: column; justify-content: center; border-radius: 3px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
    }
    .event-name { display: block; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 2px; text-transform: uppercase; }
    .room-label { font-style: italic; font-size: 0.9em; color: #444; margin-top: 2px; display: block; }

    /* Footer Toolbar */
    .download-toolbar { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); text-align: center; }
    .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; margin: 5px; }
    .btn-master { background: #27ae60; color: white; font-size: 1.1em; }
    .btn-person { background: #eef2f7; color: #4A90E2; border: 1px solid #4A90E2; }
    
    .status-msg { text-align: center; font-weight: bold; margin-bottom: 10px; display: block; color: #4A90E2; }
  </style>
</head>
<body>

  <h2>Master Team Schedule</h2>
  
  <div id="output" contenteditable>
    CLICK HERE AND PASTE (CTRL+V) YOUR EXCEL TABLE
  </div>

  <div id="room-panel" class="room-config">
    <strong>Define Room Names for Colors:</strong>
    <div id="room-list" style="margin-top:15px;"></div>
  </div>

  <div class="calendar-container" id="calendar-view" style="display: none;">
    <table class="calendar-table" id="master-table"></table>
  </div>

  <div class="download-toolbar" id="toolbar" style="display: none;">
    <span id="status" class="status-msg"></span>
    <button id="download-all-btn" class="btn btn-master">Download Master .ics (All Events)</button>
    <div id="person-buttons" style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;"></div>
  </div>

<script>
let globalSchedules = {};
let uniqueDates = [];
let uniqueTimes = [];
let colorMap = {}; // Maps RGB color to Room Name

// --- Helpers ---

function extractTime(text) {
  const match = text.match(/(\d{1,2}:\d{2})/);
  return match ? match[1] : null;
}

function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getDayAndDate(txt) {
  const m = txt.match(/(\d{4}-\d{2}-\d{2})/);
  return m ? m[1] : null;
}

function formatICalDate(d, t) {
  return d.replace(/-/g, '') + 'T' + t.replace(/:/g, '').padStart(4, '0') + '00';
}

function isEmptyColor(c) {
  const s = c.replace(/\s/g, '').toLowerCase();
  return s === 'rgb(255,255,255)' || s === 'rgba(0,0,0,0)' || s === 'transparent' || s === 'rgb(0,0,0)';
}

function mergeAdjacentEvents(schedules, allTimes) {
  const timeMinutes = allTimes.map(t => timeToMinutes(t)).sort((a,b) => a - b);
  
  for (let person in schedules) {
    const events = schedules[person];
    // Group by date and color
    const grouped = {};
    events.forEach(ev => {
      const key = `${ev.date}|${ev.color}`;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(ev);
    });
    
    // Merge adjacent events within each group
    const merged = [];
    for (let key in grouped) {
      const group = grouped[key].sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
      let current = group[0];
      
      for (let i = 1; i < group.length; i++) {
        const prev = group[i-1];
        const curr = group[i];
        const prevMinIdx = timeMinutes.indexOf(timeToMinutes(prev.time));
        const currMinIdx = timeMinutes.indexOf(timeToMinutes(curr.time));
        
        // Check if adjacent
        if (currMinIdx === prevMinIdx + 1) {
          // Adjacent, extend current's end time
          current.end = curr.end;
        } else {
          // Not adjacent, save current and start new
          merged.push(current);
          current = curr;
        }
      }
      merged.push(current);
    }
    
    schedules[person] = merged.sort((a, b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return timeToMinutes(a.time) - timeToMinutes(b.time);
    });
  }
  
  return schedules;
}

// --- Logic ---

document.getElementById("output").addEventListener("paste", (e) => {
  const html = e.clipboardData.getData("text/html");
  if (!html) return;
  e.preventDefault();

  const sandbox = document.createElement('div');
  sandbox.innerHTML = html;
  document.body.appendChild(sandbox);
  const table = sandbox.querySelector('table');
  if (!table) return;

  const names = [];
  const headerRow = table.rows[0];
  for (let cell of headerRow.cells) {
    const val = cell.textContent.trim();
    if (val && val.length > 1) names.push(val);
  }

  const schedules = {};
  names.forEach(n => schedules[n] = []);
  const dateSet = new Set();
  const timeSet = new Set();
  const foundColors = new Set();

  for (let i = 1; i < table.rows.length; i++) {
    const row = table.rows[i];
    let dateStr = "", startTime = null, endTime = null, dataStartIdx = -1, timesFound = 0;

    for (let j = 0; j < row.cells.length; j++) {
      const txt = row.cells[j].textContent.trim();
      const d = getDayAndDate(txt); if (d) dateStr = d;
      const t = extractTime(txt);
      if (t) {
        timesFound++;
        if (timesFound === 1) startTime = t;
        if (timesFound === 2) { endTime = t; dataStartIdx = j + 1; break; }
      }
    }

    if (!startTime || !endTime || !dateStr) continue;
    dateSet.add(dateStr);
    timeSet.add(startTime);

    for (let k = 0; k < names.length; k++) {
      const cell = row.cells[dataStartIdx + k];
      if (!cell) continue;
      const bgColor = window.getComputedStyle(cell).backgroundColor;
      if (!isEmptyColor(bgColor)) {
        foundColors.add(bgColor);
        schedules[names[k]].push({
          date: dateStr, time: startTime,
          start: formatICalDate(dateStr, startTime),
          end: formatICalDate(dateStr, endTime),
          color: bgColor, students: cell.textContent.trim()
        });
      }
    }
  }

  globalSchedules = mergeAdjacentEvents(schedules, Array.from(timeSet));
  uniqueDates = Array.from(dateSet).sort();
  uniqueTimes = Array.from(timeSet).sort((a,b) => timeToMinutes(a) - timeToMinutes(b));

  setupRoomInputs(foundColors);
  renderMasterCalendar();
  renderButtons(names);
  
  document.getElementById("calendar-view").style.display = "block";
  document.getElementById("toolbar").style.display = "block";
  document.body.removeChild(sandbox);
});

function setupRoomInputs(colors) {
  const container = document.getElementById('room-list');
  container.innerHTML = '';
  colorMap = {};
  colors.forEach(c => {
    colorMap[c] = ""; 
    const div = document.createElement('div');
    div.className = 'room-row';
    div.innerHTML = `
      <div class="color-swatch" style="background:${c}"></div>
      <input type="text" class="room-input" placeholder="Enter Room Name..." data-color="${c}">
    `;
    div.querySelector('input').oninput = (e) => {
      colorMap[c] = e.target.value;
      renderMasterCalendar(); // Re-render to show room names
    };
    container.appendChild(div);
  });
  document.getElementById('room-panel').style.display = "block";
}

function renderMasterCalendar() {
  const table = document.getElementById('master-table');
  table.innerHTML = '';

  let headHtml = `<tr><th class="time-cell">Time</th>`;
  uniqueDates.forEach(d => {
    headHtml += `<th>${new Date(d).toLocaleDateString('en-US', {weekday: 'long'})}<br><small>${d}</small></th>`;
  });
  table.innerHTML += headHtml + `</tr>`;

  uniqueTimes.forEach(timeSlot => {
    let rowHtml = `<tr><td class="time-cell">${timeSlot}</td>`;
    uniqueDates.forEach(dateSlot => {
      rowHtml += `<td><div class="slot-container">`;
      for (let person in globalSchedules) {
        const ev = globalSchedules[person].find(e => e.date === dateSlot && e.time === timeSlot);
        if (ev) {
          const roomName = colorMap[ev.color] || "";
          rowHtml += `
            <div class="event-block" style="background-color: ${ev.color}">
              <span class="event-name">${person}</span>
              ${roomName ? `<span class="room-label">${roomName}</span>` : ''}
            </div>`;
        }
      }
      rowHtml += `</div></td>`;
    });
    table.innerHTML += rowHtml + `</tr>`;
  });
}

function renderButtons(names) {
  const container = document.getElementById('person-buttons');
  container.innerHTML = '';
  names.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-person';
    btn.innerText = `Download ${name}.ics`;
    btn.onclick = () => downloadBlob(generateICS(name, globalSchedules[name]), `${name}_schedule.ics`);
    container.appendChild(btn);
  });
}

function generateICS(name, events) {
  let ics = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//MasterParser//EN\n`;
  events.forEach(ev => {
    const room = colorMap[ev.color] || "TBD";
    ics += `BEGIN:VEVENT\nUID:${Math.random()}@p\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\n`;
    ics += `DTSTART:${ev.start}\nDTEND:${ev.end}\nSUMMARY:${name}\nLOCATION:${room}\nEND:VEVENT\n`;
  });
  return ics + `END:VCALENDAR`;
}

function downloadBlob(content, filename) {
  const blob = new Blob([content], { type: 'text/calendar' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

document.getElementById("download-all-btn").onclick = () => {
  let master = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//MasterParser//EN\n`;
  for (let name in globalSchedules) {
    globalSchedules[name].forEach(ev => {
      const room = colorMap[ev.color] || "TBD";
      master += `BEGIN:VEVENT\nUID:${Math.random()}@p\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\n`;
      master += `DTSTART:${ev.start}\nDTEND:${ev.end}\nSUMMARY:${name}\nLOCATION:${room}\nEND:VEVENT\n`;
    });
  }
  downloadBlob(master + `END:VCALENDAR`, "Team_Master_Schedule.ics");
};
</script>
</body>
</html>
